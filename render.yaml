services:
  # PostgreSQL Database
  - name: database
    plan: free
    region: oregon
    database:
      database_name: payout_engine
      user: payout
      version: "15"

  # Redis
  - name: redis
    plan: free
    region: oregon
    type: redis
    version: "7"

  # Backend (Django)
  - name: backend
    githubRepo: ShivamH1/payout-system
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "your-app.onrender.com"
      - key: DB_ENGINE
        value: "postgresql"

  # Celery Worker
  - name: worker
    githubRepo: ShivamH1/payout-system
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: "postgresql"
    dependsOn:
      - database
      - redis

  # Celery Beat (Scheduler)
  - name: beat
    githubRepo: ShivamH1/payout-system
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: "postgresql"
    dependsOn:
      - database
      - redis

  # Frontend (Static)
  - name: frontend
    githubRepo: ShivamH1/payout-system
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://backend.your-app.onrender.com"
